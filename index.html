<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de QR Code</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --border: #2e2e40;
      --accent: #7c6af7;
      --accent-hover: #9585ff;
      --text: #e8e8f0;
      --muted: #6b6b8a;
      --success: #4ade80;
      --radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.4rem;
    }

    header p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 520px;
    }

    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      background: var(--bg);
      padding: 4px;
      border-radius: 10px;
    }

    .tab {
      flex: 1;
      padding: 0.5rem;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .tab.active {
      background: var(--accent);
      color: #fff;
    }

    .tab:hover:not(.active) { color: var(--text); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    input[type="text"],
    input[type="url"],
    input[type="email"],
    input[type="tel"],
    textarea,
    select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 0.65rem 0.85rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1rem;
      font-family: inherit;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
    }

    textarea { resize: vertical; min-height: 80px; }

    .row { display: flex; gap: 1rem; }
    .row > * { flex: 1; }

    .color-row {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .color-group {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .color-group input[type="color"] {
      width: 100%;
      height: 42px;
      padding: 2px 4px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      cursor: pointer;
      margin-bottom: 0;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.2rem 0;
    }

    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    button.generate {
      width: 100%;
      padding: 0.8rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }

    button.generate:hover { background: var(--accent-hover); }
    button.generate:active { transform: scale(0.98); }

    /* QR Output */
    .output {
      margin-top: 2rem;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
    }

    .output.visible { display: flex; }

    .qr-wrapper {
      background: #fff;
      border-radius: var(--radius);
      padding: 1.2rem;
      display: inline-flex;
      box-shadow: 0 0 0 1px var(--border);
    }

    .qr-wrapper canvas { display: block; }

    .download-row {
      display: flex;
      gap: 0.6rem;
    }

    .btn-dl {
      padding: 0.55rem 1.1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 500;
      transition: border-color 0.2s, background 0.2s;
    }

    .btn-dl:hover { border-color: var(--accent); background: #23233a; }

    .copy-btn {
      padding: 0.55rem 1.1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 500;
      transition: border-color 0.2s, background 0.2s;
    }

    .copy-btn:hover { border-color: var(--accent); background: #23233a; }
    .copy-btn.copied { border-color: var(--success); color: var(--success); }

    .error-msg {
      color: #f87171;
      font-size: 0.88rem;
      margin-top: 0.5rem;
      display: none;
    }

    footer {
      margin-top: 3rem;
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
    }

    @media (max-width: 480px) {
      .card { padding: 1.4rem; }
      .row { flex-direction: column; gap: 0; }
    }
  </style>
</head>
<body>

<header>
  <h1>Gerador de QR Code</h1>
  <p>Crie QR Codes gratuitamente, sem rastreamento</p>
</header>

<div class="card">
  <!-- Tabs -->
  <div class="tabs" role="tablist">
    <button class="tab active" data-tab="url">URL</button>
    <button class="tab" data-tab="texto">Texto</button>
    <button class="tab" data-tab="email">E-mail</button>
    <button class="tab" data-tab="telefone">Telefone</button>
    <button class="tab" data-tab="wifi">Wi-Fi</button>
  </div>

  <!-- URL -->
  <div class="tab-panel active" id="tab-url">
    <label for="input-url">Endereço (URL)</label>
    <input type="url" id="input-url" placeholder="https://exemplo.com.br" />
  </div>

  <!-- Texto -->
  <div class="tab-panel" id="tab-texto">
    <label for="input-texto">Texto livre</label>
    <textarea id="input-texto" placeholder="Digite qualquer texto aqui..."></textarea>
  </div>

  <!-- E-mail -->
  <div class="tab-panel" id="tab-email">
    <label for="input-email-to">Destinatário</label>
    <input type="email" id="input-email-to" placeholder="contato@exemplo.com" />
    <label for="input-email-sub">Assunto</label>
    <input type="text" id="input-email-sub" placeholder="Assunto do e-mail" />
    <label for="input-email-body">Mensagem</label>
    <textarea id="input-email-body" placeholder="Corpo do e-mail..."></textarea>
  </div>

  <!-- Telefone -->
  <div class="tab-panel" id="tab-telefone">
    <label for="input-tel">Número de telefone</label>
    <input type="tel" id="input-tel" placeholder="+55 11 99999-9999" />
  </div>

  <!-- Wi-Fi -->
  <div class="tab-panel" id="tab-wifi">
    <label for="wifi-ssid">Nome da rede (SSID)</label>
    <input type="text" id="wifi-ssid" placeholder="MinhaRede" />
    <label for="wifi-pass">Senha</label>
    <input type="text" id="wifi-pass" placeholder="senha123" />
    <label for="wifi-sec">Segurança</label>
    <select id="wifi-sec">
      <option value="WPA">WPA / WPA2</option>
      <option value="WEP">WEP</option>
      <option value="">Nenhuma (aberta)</option>
    </select>
    <label style="display:flex;align-items:center;gap:0.5rem;text-transform:none;letter-spacing:0;font-size:0.9rem;color:var(--text);margin-bottom:0.8rem;">
      <input type="checkbox" id="wifi-hidden" style="width:auto;margin:0;" />
      Rede oculta
    </label>
  </div>

  <div class="divider"></div>

  <!-- Opções visuais -->
  <p class="section-title">Aparência</p>

  <div class="color-row">
    <div class="color-group">
      <label>Cor do QR</label>
      <input type="color" id="qr-color" value="#000000" />
    </div>
    <div class="color-group">
      <label>Cor de fundo</label>
      <input type="color" id="qr-bg" value="#ffffff" />
    </div>
  </div>

  <div class="row">
    <div>
      <label for="qr-size">Tamanho (px)</label>
      <select id="qr-size">
        <option value="128">128</option>
        <option value="200">200</option>
        <option value="256" selected>256</option>
        <option value="512">512</option>
        <option value="1024">1024</option>
      </select>
    </div>
    <div>
      <label for="qr-level">Correção de erro</label>
      <select id="qr-level">
        <option value="L">L — Baixa</option>
        <option value="M" selected>M — Média</option>
        <option value="Q">Q — Alta</option>
        <option value="H">H — Máxima</option>
      </select>
    </div>
  </div>

  <p id="error-msg" class="error-msg">Preencha o campo corretamente antes de gerar.</p>
  <button class="generate" id="btn-generate">Gerar QR Code</button>
</div>

<!-- Output -->
<div class="output" id="output">
  <div class="qr-wrapper">
    <canvas id="qr-canvas"></canvas>
  </div>
  <div class="download-row">
    <button class="btn-dl" id="dl-png">Baixar PNG</button>
    <button class="btn-dl" id="dl-svg">Baixar SVG</button>
    <button class="copy-btn" id="btn-copy">Copiar imagem</button>
  </div>
</div>

<footer>Gerado localmente no seu navegador — nenhum dado é enviado a servidores.</footer>

<script>
  // Tab switching
  const tabs = document.querySelectorAll('.tab');
  const panels = document.querySelectorAll('.tab-panel');
  let activeTab = 'url';

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      panels.forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      activeTab = tab.dataset.tab;
      document.getElementById('tab-' + activeTab).classList.add('active');
      document.getElementById('output').classList.remove('visible');
    });
  });

  // Build QR content from active tab
  function buildContent() {
    switch (activeTab) {
      case 'url': {
        const v = document.getElementById('input-url').value.trim();
        return v ? v : null;
      }
      case 'texto': {
        const v = document.getElementById('input-texto').value.trim();
        return v ? v : null;
      }
      case 'email': {
        const to = document.getElementById('input-email-to').value.trim();
        if (!to) return null;
        const sub = encodeURIComponent(document.getElementById('input-email-sub').value.trim());
        const body = encodeURIComponent(document.getElementById('input-email-body').value.trim());
        return `mailto:${to}?subject=${sub}&body=${body}`;
      }
      case 'telefone': {
        const v = document.getElementById('input-tel').value.trim().replace(/\s/g, '');
        return v ? `tel:${v}` : null;
      }
      case 'wifi': {
        const ssid = document.getElementById('wifi-ssid').value.trim();
        if (!ssid) return null;
        const pass = document.getElementById('wifi-pass').value;
        const sec  = document.getElementById('wifi-sec').value;
        const hidden = document.getElementById('wifi-hidden').checked ? 'true' : 'false';
        const esc = s => s.replace(/([\\;,":'])/g, '\\$1');
        return `WIFI:T:${sec};S:${esc(ssid)};P:${esc(pass)};H:${hidden};;`;
      }
    }
  }

  let lastSvg = '';

  async function generate() {
    const content = buildContent();
    const errEl = document.getElementById('error-msg');

    if (!content) {
      errEl.style.display = 'block';
      return;
    }
    errEl.style.display = 'none';

    const canvas = document.getElementById('qr-canvas');
    const size   = parseInt(document.getElementById('qr-size').value);
    const level  = document.getElementById('qr-level').value;
    const color  = document.getElementById('qr-color').value;
    const bgColor= document.getElementById('qr-bg').value;

    try {
      await QRCode.toCanvas(canvas, content, {
        width: size,
        errorCorrectionLevel: level,
        color: { dark: color, light: bgColor },
        margin: 2,
      });

      // Generate SVG for download
      lastSvg = await QRCode.toString(content, {
        type: 'svg',
        errorCorrectionLevel: level,
        color: { dark: color, light: bgColor },
        margin: 2,
        width: size,
      });

      document.getElementById('output').classList.add('visible');
      document.getElementById('output').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    } catch (e) {
      errEl.textContent = 'Erro ao gerar QR Code: ' + e.message;
      errEl.style.display = 'block';
    }
  }

  document.getElementById('btn-generate').addEventListener('click', generate);

  // Allow Enter in text inputs to trigger generate
  document.querySelectorAll('input[type="url"], input[type="text"], input[type="email"], input[type="tel"]')
    .forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') generate(); }));

  // Download PNG
  document.getElementById('dl-png').addEventListener('click', () => {
    const canvas = document.getElementById('qr-canvas');
    const a = document.createElement('a');
    a.download = 'qrcode.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  });

  // Download SVG
  document.getElementById('dl-svg').addEventListener('click', () => {
    if (!lastSvg) return;
    const blob = new Blob([lastSvg], { type: 'image/svg+xml' });
    const a = document.createElement('a');
    a.download = 'qrcode.svg';
    a.href = URL.createObjectURL(blob);
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  });

  // Copy image to clipboard
  document.getElementById('btn-copy').addEventListener('click', async () => {
    const canvas = document.getElementById('qr-canvas');
    const btn = document.getElementById('btn-copy');
    try {
      canvas.toBlob(async blob => {
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        btn.textContent = 'Copiado!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copiar imagem'; btn.classList.remove('copied'); }, 2000);
      });
    } catch {
      btn.textContent = 'Não suportado';
      setTimeout(() => { btn.textContent = 'Copiar imagem'; }, 2000);
    }
  });
</script>
</body>
</html>
